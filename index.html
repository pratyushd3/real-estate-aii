<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>AI Real Estate Assistant</title>

  <style>

    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:40px;
    }

    .chat-box{
      max-width:600px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    textarea{
      width:100%;
      height:100px;
      padding:10px;
      font-size:16px;
    }

    button{
      margin-top:10px;
      padding:10px 20px;
      border:none;
      background:black;
      color:white;
      cursor:pointer;
      border-radius:5px;
    }

    .reply{
      margin-top:20px;
      padding:15px;
      background:#f1f1f1;
      border-radius:5px;
    }

  </style>
</head>

<body>

<div class="chat-box">

  <h2>
    AI Real Estate Assistant
  </h2>

  <textarea
    id="message"
    placeholder="Type customer message..."
  ></textarea>

  <br>

  <button onclick="sendMessage()">
    Send
  </button>

  <div class="reply" id="reply">
    AI reply will appear here...
  </div>

</div>

<script>

async function sendMessage(){

  const message =
    document.getElementById('message').value;

  const response = await fetch(
    'https://real-estate-aii-1.onrender.com/chat',
    {
      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        message
      })
    }
  );

  const data = await response.json();

  document.getElementById('reply').innerText =
    data.reply;
}

</script>

</body>
</html>
